services:
  postgres:
    image: postgres:16
    container_name: eonvideo-postgres
    environment:
      POSTGRES_DB: eonvideo
      POSTGRES_USER: eonvideo
      POSTGRES_PASSWORD: eonvideo
    ports:
      - "5432:5432"
    volumes:
      - eonvideo_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  eonvideo_pgdata:

